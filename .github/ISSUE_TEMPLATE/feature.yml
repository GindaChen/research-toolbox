name: Feature Request
description: Propose a new feature
title: "[Feature] "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: "## Feature Request"
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature you'd like
      placeholder: What should this feature do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - Extensions
        - Agent
        - CI/Infra
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - p0-critical
        - p1-high
        - p2-medium
        - p3-low
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any design mockups, related issues, or prior art
