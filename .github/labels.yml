# GitHub Labels Configuration
# Apply these labels using the GitHub API or gh CLI after initial setup
#
# Usage: gh label create "LABEL" --color "COLOR" --description "DESC"

# ── Type ──
- name: "type:feature"
  color: "0075ca"
  description: "New feature or enhancement"
- name: "type:bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "type:extension"
  color: "7057ff"
  description: "New or updated extension"
- name: "type:research-idea"
  color: "e4e669"
  description: "Research idea or experiment proposal"
- name: "type:infra"
  color: "cfd3d7"
  description: "Infrastructure, CI, tooling"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation updates"

# ── Area ──
- name: "area:frontend"
  color: "61dafb"
  description: "Frontend (React/TypeScript)"
- name: "area:backend"
  color: "3776ab"
  description: "Backend (FastAPI/Python)"
- name: "area:extensions"
  color: "7057ff"
  description: "Extension system"
- name: "area:ci"
  color: "cfd3d7"
  description: "CI/CD pipeline"
- name: "area:agent"
  color: "ff6b6b"
  description: "Agent skills, prompts, runtime"

# ── Priority ──
- name: "priority:p0-critical"
  color: "b60205"
  description: "Critical — blocks everything"
- name: "priority:p1-high"
  color: "d93f0b"
  description: "High — do this sprint"
- name: "priority:p2-medium"
  color: "fbca04"
  description: "Medium — plan for next sprint"
- name: "priority:p3-low"
  color: "0e8a16"
  description: "Low — nice to have"

# ── Status ──
- name: "status:backlog"
  color: "ededed"
  description: "In the backlog"
- name: "status:in-progress"
  color: "fbca04"
  description: "Currently being worked on"
- name: "status:blocked"
  color: "d73a4a"
  description: "Blocked by dependency"
- name: "status:review"
  color: "0075ca"
  description: "In review"

# ── Effort ──
- name: "effort:small"
  color: "c5def5"
  description: "Small — < 2 hours"
- name: "effort:medium"
  color: "bfd4f2"
  description: "Medium — 2-8 hours"
- name: "effort:large"
  color: "d4c5f9"
  description: "Large — > 8 hours"

# ── Special ──
- name: "good-first-issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "agent-task"
  color: "ff6b6b"
  description: "Task suitable for AI agent execution"
- name: "needs-design"
  color: "e4e669"
  description: "Needs design discussion before implementation"
